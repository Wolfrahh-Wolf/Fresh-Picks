<!--
================================================================================
  cart.html — Razorpay JS Patch
================================================================================

  HOW TO APPLY:
    1. Add the Razorpay SDK script tag  (Step 1) in your <head> block.
    2. Replace your existing confirmPayment() function (Step 2) with the
       new version below.
    3. Everything else in cart.html — states, CSS, receipt rendering,
       PDF download — stays EXACTLY as it is. Zero other changes.

  WHAT CHANGES INTERNALLY:
    OLD confirmPayment():
      → POST /api/checkout directly
      → On success, render receipt

    NEW confirmPayment():
      → POST /api/create_razorpay_order   (get Razorpay order ID + amount)
      → Open Razorpay modal               (user pays with test card)
      → On payment success, POST /api/verify_and_checkout
      → On success, render receipt        (same renderReceipt() call)

================================================================================
-->


<!-- ═══════════════════════════════════════════════════════════════════════════
     STEP 1 — ADD THIS SCRIPT TAG IN YOUR <head> BLOCK
     Place it BEFORE your own <script> tags so Razorpay is loaded first.
     ═══════════════════════════════════════════════════════════════════════════ -->

<script src="https://checkout.razorpay.com/v1/checkout.js"></script>


<!-- ═══════════════════════════════════════════════════════════════════════════
     STEP 2 — REPLACE YOUR EXISTING confirmPayment() WITH THIS ENTIRE BLOCK
     ═══════════════════════════════════════════════════════════════════════════ -->

<script>
/*
 * confirmPayment()
 * ─────────────────────────────────────────────────────────────────────────
 * Called by the "Confirm Payment" button in State 3 (invoice preview).
 *
 * FLOW:
 *   1. Disable the button to prevent double-clicks.
 *   2. POST /api/create_razorpay_order → get { razorpay_order_id, amount,
 *      currency, key_id, slot }.
 *   3. Open the Razorpay checkout modal with those details.
 *   4. On payment success → Razorpay gives us { razorpay_order_id,
 *      razorpay_payment_id, razorpay_signature }.
 *   5. POST /api/verify_and_checkout with those three fields.
 *   6. On success → call renderReceipt() exactly as before.
 *   7. On any failure → re-enable button, show toast error.
 *
 * NOTE ON HTTPS:
 *   Razorpay's checkout.js refuses to open the modal on plain HTTP.
 *   Your server already runs on HTTPS (self-signed cert) so this works
 *   fine on your local network. If a browser blocks it, click
 *   "Advanced → Proceed" once to accept the self-signed cert.
 */
async function confirmPayment() {

    /* ── Guard: read the selected slot ──────────────────────────────────── */
    const slot = window._selectedSlot;
    if (!slot) {
        showToast("Please select a delivery slot first.", "warning");
        return;
    }

    /* ── Disable button to prevent double-submission ─────────────────────── */
    const btn = document.getElementById("confirmPayBtn");
    if (btn) {
        btn.disabled    = true;
        btn.innerHTML   = `<span class="spinner-border spinner-border-sm me-2"></span>Connecting...`;
    }

    try {

        /* ══════════════════════════════════════════════════════════════════
           STEP A — Create Razorpay order on the server
           ══════════════════════════════════════════════════════════════════ */
        const orderRes  = await fetch("/api/create_razorpay_order", {
            method:  "POST",
            headers: { "Content-Type": "application/json" },
            body:    JSON.stringify({ delivery_slot: slot })
        });
        const orderData = await orderRes.json();

        if (orderData.status !== "SUCCESS") {
            throw new Error(orderData.message || "Could not initiate payment");
        }

        /* ══════════════════════════════════════════════════════════════════
           STEP B — Open Razorpay checkout modal
           ══════════════════════════════════════════════════════════════════ */
        await new Promise((resolve, reject) => {

            const options = {
                /* Credentials & order */
                key:      orderData.key_id,
                amount:   orderData.amount,          // in paise
                currency: orderData.currency,
                order_id: orderData.razorpay_order_id,

                /* Branding shown inside the modal */
                name:        "Fresh Picks",
                description: `${slot} Slot Delivery`,
                image:       "/static/images/logo.png",  // your logo path

                /* Pre-fill from session if you want (optional) */
                // prefill: { name: "...", email: "...", contact: "..." },

                /* Theme — match your site's accent colour */
                theme: { color: "#2ecc71" },

                /* ── Payment success handler ─────────────────────────────
                   Razorpay calls this with the three verification fields.
                   We don't commit the order here — we send these to Flask
                   for server-side HMAC verification first.            ── */
                handler: async function (response) {
                    try {
                        /* Update button state */
                        if (btn) {
                            btn.innerHTML = `<span class="spinner-border spinner-border-sm me-2"></span>Verifying...`;
                        }

                        /* ══════════════════════════════════════════════════
                           STEP C — Verify signature + commit order
                           ══════════════════════════════════════════════════ */
                        const verifyRes  = await fetch("/api/verify_and_checkout", {
                            method:  "POST",
                            headers: { "Content-Type": "application/json" },
                            body:    JSON.stringify({
                                razorpay_order_id:   response.razorpay_order_id,
                                razorpay_payment_id: response.razorpay_payment_id,
                                razorpay_signature:  response.razorpay_signature
                            })
                        });
                        const verifyData = await verifyRes.json();

                        if (verifyData.status !== "SUCCESS") {
                            throw new Error(verifyData.message || "Order verification failed");
                        }

                        /* ══════════════════════════════════════════════════
                           STEP D — Render receipt (identical to old flow)
                           verifyData has the exact same shape as the old
                           /api/checkout response, so renderReceipt() works
                           without any modification.
                           ══════════════════════════════════════════════════ */
                        renderReceipt(verifyData);
                        resolve();

                    } catch (err) {
                        reject(err);
                    }
                },

                /* ── Modal dismissed without paying ─────────────────────── */
                modal: {
                    ondismiss: function () {
                        reject(new Error("Payment cancelled"));
                    }
                }
            };

            /* Open the modal */
            const rzp = new Razorpay(options);

            /* ── Payment failure inside the modal (e.g. wrong card) ──────── */
            rzp.on("payment.failed", function (failureResponse) {
                reject(new Error(
                    failureResponse.error?.description || "Payment failed"
                ));
            });

            rzp.open();
        });

        /* If we reach here, everything succeeded — button stays disabled
           (the receipt state is already shown, no need to re-enable it). */

    } catch (err) {
        /* ── Any failure: network error, bad signature, C binary error ───── */
        showToast(err.message || "Payment failed. Please try again.", "danger");

        /* Re-enable the button so the user can retry */
        if (btn) {
            btn.disabled  = false;
            btn.innerHTML = `<i class="bi bi-shield-check me-2"></i>Confirm Payment`;
        }
    }
}


/*
 * renderReceipt(data)
 * ─────────────────────────────────────────────────────────────────────────
 * UNCHANGED from the original cart.html.
 * Accepts the JSON response from /api/verify_and_checkout
 * (same shape as the old /api/checkout response).
 *
 * If you already have this function in cart.html, DO NOT duplicate it.
 * It is included here only for reference — your existing one will work.
 */
function renderReceipt(data) {
    /* ── Populate receipt fields ────────────────────────────────────────── */
    document.getElementById("rcpt-order-id").textContent  = data.order_id  || "—";
    document.getElementById("rcpt-slot").textContent      = data.slot      || "—";
    document.getElementById("rcpt-boy-name").textContent  = data.boy_name  || "—";
    document.getElementById("rcpt-boy-phone").textContent = data.boy_phone || "—";
    document.getElementById("rcpt-datetime").textContent  = new Date().toLocaleString("en-IN");

    /* ── Parse items string → table rows ────────────────────────────────── */
    // items_string format: "V1001:Tomato:500:30.00,V1002:Onion:250:25.00"
    const itemsList = document.getElementById("rcpt-items-list");
    if (itemsList && data.items) {
        itemsList.innerHTML = data.items.split(",").map(entry => {
            const [vid, name, qty, price] = entry.split(":");
            const grams    = parseInt(qty  || 0);
            const rate     = parseFloat(price || 0);
            const lineAmt  = (grams / 1000) * rate;
            return `
              <div class="rcpt-item-row">
                <span style="flex:3">${name || vid}</span>
                <span style="flex:1.5;text-align:right">₹${rate.toFixed(2)}/kg</span>
                <span style="flex:1.5;text-align:right">${grams}g</span>
                <span style="flex:1.5;text-align:right">₹${lineAmt.toFixed(2)}</span>
              </div>`;
        }).join("");
    }

    /* ── Total ──────────────────────────────────────────────────────────── */
    const totalEl = document.getElementById("rcpt-grand-total");
    if (totalEl) totalEl.textContent = `₹${parseFloat(data.total || 0).toFixed(2)}`;

    /* ── Razorpay payment badge (new field, shown in receipt) ───────────── */
    const payBadge = document.getElementById("rcpt-pay-method");
    if (payBadge) payBadge.textContent = "Paid via Razorpay";

    /* ── Switch to receipt state ────────────────────────────────────────── */
    // Your existing goToState() or direct DOM show:
    document.querySelectorAll("[id$='State']").forEach(el => el.classList.add("d-none"));
    document.getElementById("receiptState").classList.remove("d-none");
}
</script>
